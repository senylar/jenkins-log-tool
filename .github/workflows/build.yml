
on : push

jobs:
  build-macos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          
      - name: Run build
        run: |
          # Команды для сборки, например:
          python -m build

      - name: Install wheel and copy CLI binary
        run: |
          python -m pip install dist/*.whl
          BIN_PATH=$(python -c "import sysconfig; print(sysconfig.get_path('scripts'))")
          mkdir -p out
          cp $BIN_PATH/jlt out/



      - name: Upload build 

        uses: actions/upload-artifact@master 

        with: 

          name: mac 

          path: out 
          
      
